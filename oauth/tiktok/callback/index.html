<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TikTok OAuth Callback — Nicohtown Auto-Draft</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; max-width: 720px; margin: 2.5rem auto; padding: 0 1.25rem; color: #111; line-height: 1.55; background: #fafafa; }
  h1 { font-size: 1.4rem; }
  .box { padding: 1rem 1.25rem; border: 1px solid #ddd; border-radius: 8px; background: white; margin: 1.25rem 0; }
  code { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; background: #f0f0f0; padding: 2px 6px; border-radius: 3px; word-break: break-all; }
  pre { background: #f0f0f0; padding: 1rem; border-radius: 6px; overflow-x: auto; word-break: break-all; white-space: pre-wrap; }
  .ok { color: #059669; }
  .err { color: #b91c1c; }
  button { font-size: 0.95rem; padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #2563eb; background: #2563eb; color: white; cursor: pointer; }
  button:hover { background: #1d4ed8; }
  small { color: #666; }
</style>
</head>
<body>

<h1>TikTok OAuth Callback</h1>
<p><small>For the <code>nicohtown auto-draft</code> internal automation app.</small></p>

<div id="status" class="box">Reading URL parameters…</div>

<div id="code-block" class="box" style="display:none">
  <p><strong>Authorization code</strong> (paste this back into the automation):</p>
  <pre id="code-value"></pre>
  <button onclick="copyCode()">Copy</button>
  <span id="copy-feedback" style="margin-left: 1rem; color: #059669;"></span>
</div>

<div id="state-block" class="box" style="display:none">
  <p><strong>state</strong> (verify this matches what was sent):</p>
  <pre id="state-value"></pre>
</div>

<div id="error-block" class="box" style="display:none">
  <p class="err"><strong>Error from TikTok:</strong></p>
  <pre id="error-value"></pre>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const state = params.get("state");
  const error = params.get("error");
  const errorDescription = params.get("error_description");

  const status = document.getElementById("status");
  if (error) {
    status.innerHTML = '<span class="err">OAuth returned an error.</span>';
    document.getElementById("error-block").style.display = "block";
    document.getElementById("error-value").textContent = error + (errorDescription ? "\n\n" + errorDescription : "");
  } else if (code) {
    status.innerHTML = '<span class="ok">✓ Authorization successful. Copy the code below.</span>';
    document.getElementById("code-block").style.display = "block";
    document.getElementById("code-value").textContent = code;
    if (state) {
      document.getElementById("state-block").style.display = "block";
      document.getElementById("state-value").textContent = state;
    }
    // Set document title with the code prefix so it's also visible in window title for automated capture
    document.title = "OAuth code: " + code.slice(0, 40);
  } else {
    status.innerHTML = '<span class="err">No <code>code</code> or <code>error</code> parameter in URL.</span>';
  }

  function copyCode() {
    const t = document.getElementById("code-value").textContent;
    navigator.clipboard.writeText(t).then(() => {
      document.getElementById("copy-feedback").textContent = "Copied to clipboard.";
      setTimeout(() => { document.getElementById("copy-feedback").textContent = ""; }, 2500);
    });
  }
</script>

</body>
</html>
